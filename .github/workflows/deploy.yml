on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '0 5 * * *' # 8:00 AM Cairo

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://sched-gen.rf.gd/api
    steps:
      - name: Clone Repository
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps

      - name: Substitute Secrets To Get Cookie
        uses: Lambdaspire/action-substitute-secrets-in-file@v1.1.0
        with:
          file: main.py
          tokenPattern: ${TOKEN}
          secretsJson: ${{ toJSON(secrets) }}

      - name: Get Cookie JSON
        id: cookie_json
        run: |
          COOKIE_JSON="$(python main.py)"
          echo "::add-mask::$COOKIE_JSON"
          echo "COOKIE_JSON=$COOKIE_JSON" >> $GITHUB_OUTPUT

      - name: Substitute Cookie Into PHP Script
        uses: Lambdaspire/action-substitute-secrets-in-file@v1.1.0
        with:
          file: src/index.php
          tokenPattern: ${TOKEN}
          secretsJson: ${{ steps.cookie_json.outputs.COOKIE_JSON }}

      - name: Deploy to server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: src/
          server-dir: htdocs/api/
