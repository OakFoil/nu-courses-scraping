on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    needs: get-cookie-json
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nu-courses.rf.gd
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Substitute Secrets
        uses: Lambdaspire/action-substitute-secrets-in-file@v1.1.0
        with:
          file: stc/index.php
          tokenPattern: ${TOKEN}
          secretsJson: ${{ needs.get-cookie-json.outputs.cookie_json }}

      - name: Deploy to server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: src/
          server-dir: htdocs/

  get-cookie-json:
    runs-on: ubuntu-latest
    outputs:
      cookie_json: ${{ steps.cookie_json.outputs.COOKIE_JSON }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v5

      - name: Substitute Secrets
        uses: Lambdaspire/action-substitute-secrets-in-file@v1.1.0
        with:
          file: main.py
          tokenPattern: ${TOKEN}
          secretsJson: ${{ toJSON(secrets) }}

      - name: Set up Python
        uses: actions/setup-python@v6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure browsers are installed
        run: python -m playwright install --with-deps

      - name: Get Cookie JSON
        id: cookie_json
        run: |
          COOKIE_JSON="$(python main.py)"
          echo "::add-mask::$COOKIE_JSON"
          echo "COOKIE_JSON=$COOKIE_JSON" >> $GITHUB_OUTPUT
